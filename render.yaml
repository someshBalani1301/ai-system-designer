# Render.com Infrastructure Configuration
# This file must be at the repository root for Render to detect it

services:
  - type: web
    name: ai-system-designer-backend
    runtime: node
    plan: free
    rootDir: ai-system-designer/server
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: OPENROUTER_API_KEY
        scope: run
      - key: OPENAI_API_KEY
        scope: run
      - key: CORS_ORIGIN
        value: https://ai-system-designer.vercel.app
      - key: REQUEST_TIMEOUT
        value: "30000"
      - key: MAX_REQUEST_SIZE
        value: "1mb"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
